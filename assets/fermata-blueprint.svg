<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Fermata blueprint waveform</title>
  <desc id="desc">A technical blueprint-style waveform moving through piano staff lines.</desc>
  <defs>
    <pattern id="grid-small" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2a322f" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <pattern id="grid-large" width="192" height="192" patternUnits="userSpaceOnUse">
      <rect width="192" height="192" fill="url(#grid-small)"/>
      <path d="M192 0H0V192" fill="none" stroke="#2a322f" stroke-opacity=".2" stroke-width="1.5"/>
    </pattern>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f3f0e8"/>
  <rect width="1600" height="1000" fill="url(#grid-large)"/>
  <rect width="1600" height="1000" filter="url(#paper)" opacity=".45"/>
  <g fill="none">
